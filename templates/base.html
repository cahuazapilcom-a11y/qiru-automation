<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
  .wrapper { max-width: 600px; margin: 0 auto; background: #ffffff; }
  .header { background: #1a1a2e; padding: 30px 40px; text-align: center; }
  .header h1 { color: #e8c848; margin: 0; font-size: 24px; letter-spacing: 1px; }
  .header p { color: #cccccc; margin: 5px 0 0; font-size: 13px; }
  .body { padding: 35px 40px; }
  .body h2 { color: #1a1a2e; font-size: 20px; margin-top: 0; }
  .body p { color: #444444; line-height: 1.7; font-size: 15px; }
  .product-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px 20px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
  .product-name { font-weight: bold; color: #1a1a2e; font-size: 15px; }
  .product-detail { color: #666; font-size: 13px; }
  .product-price { color: #e8c848; font-weight: bold; font-size: 18px; background: #1a1a2e; padding: 5px 12px; border-radius: 5px; }
  .cta-button { display: inline-block; background: #e8c848; color: #1a1a2e; padding: 14px 30px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 16px; margin: 20px 0; }
  .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
  .badge-hot { background: #ff4444; color: white; }
  .badge-warm { background: #ff9800; color: white; }
  .badge-cold { background: #2196F3; color: white; }
  .footer { background: #1a1a2e; padding: 25px 40px; text-align: center; }
  .footer p { color: #999999; font-size: 12px; margin: 4px 0; }
  .footer a { color: #e8c848; text-decoration: none; }
  .divider { border: none; border-top: 1px solid #eeeeee; margin: 25px 0; }
  .highlight-box { background: #fff8e1; border-left: 4px solid #e8c848; padding: 15px 20px; border-radius: 0 8px 8px 0; margin: 20px 0; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>QIRU CENTER</h1>
    <p>Tu Hogar Bonito</p>
  </div>
  <div class="body">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    <p>📞 <a href="tel:+51918156548">918 156 548</a></p>
    <p>© 2025 Qiru Center - Tu Hogar Bonito. Todos los derechos reservados.</p>
  </div>
</div>
</body>
</html>
